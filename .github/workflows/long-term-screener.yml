name: Long Term Stock Screener

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1-5"

jobs:
  run-long-term-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare persisted directories
        run: |
          mkdir -p results/long_term_watchlists
          mkdir -p results/long_term_tracking
          mkdir -p results/long_term_gc_watchlists

      - name: Restore long-term history
        uses: actions/cache/restore@v4
        with:
          path: |
            results/long_term_watchlists
            results/long_term_tracking
            results/long_term_gc_watchlists
            universe_offset.txt
          key: long-term-screener-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            long-term-screener-history-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Set run date
        run: |
          echo "RUN_DATE=$(date +%F)" >> $GITHUB_ENV

      - name: Run long term screener
        run: |
          python long_term_screener.py

      - name: Run long term tracking
        run: |
          python track_long_term_positions.py

      - name: Save long-term history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            results/long_term_watchlists
            results/long_term_tracking
            results/long_term_gc_watchlists
            universe_offset.txt
          key: long-term-screener-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload result CSV files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-term-screener-results-${{ env.RUN_DATE }}
          path: |
            long_term_watchlist.csv
            long_term_gc_watchlist.csv
            long_term_tracking.csv
            tracked_tickers.csv
            universe_offset.txt
            results/long_term_watchlists/*.csv
            results/long_term_gc_watchlists/*.csv
            results/long_term_tracking/*.csv
