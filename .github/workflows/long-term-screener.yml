name: Long Term Stock Screener

on:
  workflow_dispatch:
  schedule:
    # 毎日日本時間21:00 (UTC 12:00) に自動実行
    - cron: "0 12 * * 1-5"

jobs:
  run-long-term-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          # ActionsによるGitプッシュを可能にするためにトークンを自動適用
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare persisted directories
        run: |
          mkdir -p results/long_term_watchlists
          mkdir -p results/long_term_tracking
          mkdir -p results/long_term_gc_watchlists

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Set run date
        run: |
          echo "RUN_DATE=$(date +%F)" >> $GITHUB_ENV

      - name: Run long term screener
        run: |
          python long_term_screener.py

      - name: Run long term tracking
        run: |
          python track_long_term_positions.py

      # 【最重要：フェーズ1追加】更新された全データベースを確実にGit自動コミット＆プッシュ（永続化）
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. ルート直下の更新ファイルをステージ
          for file in long_term_watchlist.csv long_term_gc_watchlist.csv long_term_tracking.csv tracked_tickers.csv universe_offset.txt; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          # 2. results ディレクトリ配下の更新ファイルを一括ステージ
          if [ -d "results" ]; then
            git add results/
          fi
          
          # 3. 差分があればプッシュ
          if ! git diff --cached --quiet; then
            # [skip ci] を含めることで、自分自身のコミットによるActionsの無限ループを防ぎます
            git commit -m "Auto-update daily long term screener data [skip ci]"
            git push origin master
          else
            echo "No changes to commit"
          fi

      - name: Upload result CSV files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-term-screener-results-${{ env.RUN_DATE }}
          path: |
            long_term_watchlist.csv
            long_term_gc_watchlist.csv
            long_term_tracking.csv
            tracked_tickers.csv
            universe_offset.txt
            results/long_term_watchlists/*.csv
            results/long_term_gc_watchlists/*.csv
            results/long_term_tracking/*.csv
